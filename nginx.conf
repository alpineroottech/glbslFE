server {
    listen 80;

    # Sanity Studio static assets (served from /static/ as absolute paths)
    location /static/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sanity Studio - SPA routing under /studio/
    location /studio/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /studio/index.html;
    }

    # Main React app
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
